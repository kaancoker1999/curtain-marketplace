services:
  db:
    image: postgres:17-alpine
    container_name: curtainos-db
    environment:
      POSTGRES_USER: curtainos
      POSTGRES_PASSWORD: curtainos
      POSTGRES_DB: curtainos
    ports:
      - "5432:5432"
    volumes:
      - curtainos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curtainos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  curtainos_pgdata:
